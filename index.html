<!doctype html>
<html lang="en" style="background:#0a2818;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2329603D'/><text y='.9em' font-size='80' x='10'>🍔</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shake Shack – The Big Shack Shout Challenge Leaderboard. Top 5 longest shouts win a FREE meal!" />
    <title>Shake Shack – Big Shack Shout Challenge 🍔</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />

    <style>
      /* ── Splash screen ─────────────────────────────────── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a2818;
        background: radial-gradient(ellipse at top, #143d22 0%, #0a2818 55%, #06180f 100%);
        gap: 0;
        font-family: 'Inter', system-ui, sans-serif;
      }
      #splash.hiding {
        opacity: 0;
        transition: opacity 0.45s ease;
        pointer-events: none;
      }

      /* Floating food emojis */
      .splash-food {
        position: absolute;
        font-size: 5rem;
        opacity: 0.07;
        pointer-events: none;
        user-select: none;
        animation: splashFloat 4s ease-in-out infinite;
      }
      .splash-food:nth-child(1)  { top:  5%; left:  3%; font-size: 6rem; animation-delay: 0s;    transform: rotate(-14deg); }
      .splash-food:nth-child(2)  { top:  8%; right: 4%; font-size: 5.5rem; animation-delay: 0.6s;  transform: rotate(12deg);  }
      .splash-food:nth-child(3)  { top: 40%; left:  2%; font-size: 5rem;   animation-delay: 1.1s;  transform: rotate(8deg);   }
      .splash-food:nth-child(4)  { top: 42%; right: 2%; font-size: 5rem;   animation-delay: 0.4s;  transform: rotate(-10deg); }
      .splash-food:nth-child(5)  { bottom: 8%; left: 8%; font-size: 5.5rem; animation-delay: 0.8s; transform: rotate(15deg);  }
      .splash-food:nth-child(6)  { bottom: 6%; right: 6%; font-size: 5rem;  animation-delay: 0.2s; transform: rotate(-8deg);  }

      @keyframes splashFloat {
        0%, 100% { transform: translateY(0px) rotate(var(--rot, -10deg)); }
        50%       { transform: translateY(-10px) rotate(var(--rot, -10deg)); }
      }

      /* Logo area */
      .splash-logo {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
        animation: splashFadeIn 0.6s ease both;
      }
      .splash-logo-emoji {
        font-size: 2.4rem;
        line-height: 1;
        filter: drop-shadow(0 4px 12px rgba(245,197,24,0.5));
        animation: splashBounce 1.8s ease-in-out infinite;
      }
      .splash-brand {
        color: #fff;
        font-size: 1.5rem;
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        line-height: 1;
      }

      /* Gold pill badge */
      .splash-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 16px;
        border-radius: 999px;
        background: linear-gradient(135deg, #F5C518, #D4A000);
        color: #1a1a1a;
        font-size: 0.7rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 28px;
        animation: splashFadeIn 0.6s 0.15s ease both;
        box-shadow: 0 4px 20px rgba(245,197,24,0.45);
      }

      /* Spinner */
      .splash-spinner-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        animation: splashFadeIn 0.5s 0.25s ease both;
      }
      .splash-spinner {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 3px solid rgba(245,197,24,0.15);
        border-top-color: #F5C518;
        animation: splashSpin 0.9s linear infinite;
      }
      .splash-loading-text {
        color: rgba(255,255,255,0.45);
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.25em;
        text-transform: uppercase;
      }

      /* Animations */
      @keyframes splashFadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes splashSpin {
        to { transform: rotate(360deg); }
      }
      @keyframes splashBounce {
        0%, 100% { transform: translateY(0);    }
        50%       { transform: translateY(-6px); }
      }

      /* Gold line at top of splash */
      .splash-gold-line {
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, #F5C518, transparent);
      }
    </style>
  </head>
  <body style="margin:0;background:#0a2818;">

    <!-- Splash screen — visible instantly, hidden once React mounts -->
    <div id="splash">
      <div class="splash-gold-line"></div>

      <!-- Floating food bg -->
      <span class="splash-food">🍔</span>
      <span class="splash-food">🥤</span>
      <span class="splash-food">🍟</span>
      <span class="splash-food">🍦</span>
      <span class="splash-food">🌭</span>
      <span class="splash-food">🍿</span>

      <!-- Logo -->
      <div class="splash-logo">
        <span class="splash-logo-emoji">🍔</span>
        <span class="splash-brand">Shake Shack</span>
      </div>

      <!-- Badge -->
      <div class="splash-badge">🏆 Big Shack Shout Challenge</div>

      <!-- Spinner + text -->
      <div class="splash-spinner-wrap">
        <div class="splash-spinner"></div>
        <span class="splash-loading-text">Loading leaderboard…</span>
      </div>
    </div>

    <div id="root" style="background:#0a2818;min-height:100vh;"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Hide splash once React has rendered into #root
      // MutationObserver watches for first child added to #root
      const splash = document.getElementById('splash');
      const root   = document.getElementById('root');
      const observer = new MutationObserver(() => {
        if (root.firstChild) {
          setTimeout(() => {
            splash.classList.add('hiding');
            setTimeout(() => splash.remove(), 480);
          }, 300);
          observer.disconnect();
        }
      });
      observer.observe(root, { childList: true });
    </script>
  </body>
</html>
